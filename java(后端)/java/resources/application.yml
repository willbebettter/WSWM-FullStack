spring:
  application:
    name: wswmqd
  datasource:
    url: jdbc:mysql://localhost:3306/project-waimai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 5000MB
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  web:
    resources:
      # 明确配置静态资源路径，避免与WebSocket路径冲突
      static-locations: classpath:/static/
      # 添加资源处理器映射，仅处理/static/路径
      add-mappings: true
server:
  port: 8080
wechat:
  mp:
    appid: #此处替换为你自己的
    secret: #此处替换为你自己的